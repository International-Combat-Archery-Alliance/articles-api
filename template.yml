AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  ICAA Articles API

Parameters:
  architecture:
    Description: Architecture to run on
    Type: String
    Default: x86_64
    AllowedValues:
      - arm64
      - x86_64

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Environment:
      Variables:
        DYNAMO_TABLE_NAME: articles-api
        OTEL_EXPORTER_OTLP_ENDPOINT: ""

Resources:
  ArticlesHttpApi:
    Type: AWS::Serverless::HttpApi

  ArticlesApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      DomainName: api.icaa.world
      ApiId: !Ref ArticlesHttpApi
      Stage: !Ref ArticlesHttpApi.Stage
      ApiMappingKey: articles

  ArticlesApiTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: articles-api
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  ICAAArticles:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Architectures:
        - !Ref architecture
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !GetAtt ArticlesApiTable.Arn
                - !Sub "${ArticlesApiTable.Arn}/index/*"
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/jwtSigningKeys"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/newrelic-license-key"
      Events:
        APIEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref ArticlesHttpApi
            Path: '/{proxy+}'
            Method: ANY
    Metadata:
      DockerTag: v1
      DockerContext: .
      Dockerfile: Dockerfile

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ICAAArticles}
      RetentionInDays: 30
